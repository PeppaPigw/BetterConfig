# oauth_resource = "https://github.com/"
# startup_timeout_sec = 30
# tool_timeout_sec = 120
# http_headers = { "x-org" = "your-org" }

# ------------------------------------------------------------------------------
# 8) Apps / Connectors 控制
# ------------------------------------------------------------------------------

[apps._default]
enabled = true
destructive_enabled = false         # 默认禁止 destructive_hint=true 的工具。
open_world_enabled = true           # 默认允许 open_world_hint=true；需要更封闭可改 false。

[apps.github]
enabled = true
default_tools_enabled = true
default_tools_approval_mode = "auto"
destructive_enabled = false
open_world_enabled = true

[apps.github.tools.search_issues]
enabled = true
approval_mode = "auto"

[apps.github.tools.create_issue]
enabled = true
approval_mode = "prompt"            # 有副作用的工具显式提示更稳。

# ------------------------------------------------------------------------------
# 9) OpenTelemetry（默认仅保留最小安全配置；Exporter 样例注释）
# ------------------------------------------------------------------------------

[otel]
environment = "dev"
log_user_prompt = false             # 默认不要把原始 prompt 发出去。

# [otel.trace_exporter.otlp-http]
# endpoint = "http://127.0.0.1:4318/v1/traces"
# protocol = "json"
# headers = { "x-otel-key" = "replace-me" }

# [otel.trace_exporter.otlp-http.tls]
# ca-certificate = "C:\\certs\\otel-ca.pem"
# client-certificate = "C:\\certs\\otel-client.pem"
# client-private-key = "C:\\certs\\otel-client-key.pem"

# [otel.metrics_exporter.otlp-http]
# endpoint = "http://127.0.0.1:4318/v1/metrics"
# protocol = "json"
# headers = {}

# [otel.exporter.otlp-http]
# endpoint = "http://127.0.0.1:4318/v1/logs"
# protocol = "json"
# headers = {}

# ------------------------------------------------------------------------------
# 10) 项目信任映射（示例保留，默认不预置你的本地路径）
# ------------------------------------------------------------------------------

[projects]
# [projects."C:\\Users\\<YOUR_USER>"]
# trust_level = "trusted"
#
# [projects."\\\\?\\E:\\VSCodeSpace\\CLIProxyAPI"]
# trust_level = "trusted"

# ------------------------------------------------------------------------------
# 11) Profiles
# ------------------------------------------------------------------------------

# default：日常主力档，和顶层策略基本一致。
[profiles.default]
model = "gpt-5.4"
model_provider = "openai"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
service_tier = "fast"
personality = "pragmatic"
tools_view_image = true
tools_web_search = true
model_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"
plan_mode_reasoning_effort = "high"
experimental_use_unified_exec_tool = true
chatgpt_base_url = "https://chatgpt.com/backend-api/"

[profiles.default.analytics]
enabled = true

[profiles.default.windows]
sandbox = "elevated"

[profiles.default.features]
artifact = true
apps = true
apps_mcp_gateway = true
fast_mode = true
image_generation = true
multi_agent = false
personality = true
powershell_utf8 = true
shell_snapshot = true
shell_tool = true
sqlite = true
unified_exec = true
undo = true

# fast：你完全信任当前项目时用，追求少打断和更快响应。
[profiles.fast]
model = "gpt-5.4"
model_provider = "openai"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
service_tier = "fast"
personality = "pragmatic"
tools_view_image = true
tools_web_search = true
model_reasoning_effort = "medium"
model_reasoning_summary = "concise"
model_verbosity = "low"

[profiles.fast.features]
fast_mode = true
shell_snapshot = true
shell_tool = true
unified_exec = true

# safe：审查 / 讲解 / 阅读模式。
[profiles.safe]
model = "gpt-5.4"
model_provider = "openai"
approval_policy = "untrusted"
sandbox_mode = "read-only"
web_search = "disabled"
service_tier = "flex"
personality = "pragmatic"
tools_view_image = true
tools_web_search = false
model_reasoning_effort = "high"
model_reasoning_summary = "auto"
model_verbosity = "medium"

[profiles.safe.features]
artifact = true
personality = true
shell_tool = true
sqlite = true
undo = true

# extreme：极致性能档——最新模型、最高推理、所有工具全开，适合复杂任务冲刺。
[profiles.extreme]
model = "gpt-5.4"
model_provider = "openai"
approval_policy = "never"
sandbox_mode = "danger-full-access"
web_search = "live"
service_tier = "fast"
personality = "pragmatic"
tools_view_image = true
tools_web_search = true
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
model_verbosity = "high"

[profiles.extreme.features]
apps = true
apps_mcp_gateway = true
artifact = true
child_agents_md = true
fast_mode = true
image_detail_original = true
image_generation = true
multi_agent = true
personality = true
powershell_utf8 = true
prevent_idle_sleep = true
shell_snapshot = true
shell_tool = true
sqlite = true
unified_exec = true
undo = true

# daily：日常轻量档——medium 推理、按需审批、稳定优先，接近 Codex 开箱默认值。
[profiles.daily]
model = "gpt-5.4"
model_provider = "openai"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"
